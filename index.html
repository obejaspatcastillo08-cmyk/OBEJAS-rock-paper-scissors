<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 <div class="game-container">
  <h1>Rock Paper Scissors Game</h1>

 <div class="scoreboard">
  <div>You: <span id="user-score">0</span></div>
  <div>Computer: <span id="computer-score">0</span></div>
 </div>

 <div class="arena">
  <div class="choice-display" id="user-choice"></div>
  <div class="vs">VS</div>
  <div class="choice-display" id="computer-choice"></div>
 </div>

<h2 id="result">Choose your move</h2>

<div class="buttons">
  <button onclick="play('rock')">✊</button>
  <button onclick="play('paper')">✋</button>
  <button onclick="play('scissors')">✌️</button>
</div>

<button id="reset" onclick="resetGame()">Reset</button>
</div>

<script src="script.js"></script>
</body>
</html>
