<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 <div class="game-container"></div>
  <h1>Rock Paper Scissors Game</h1>

 <div class="scoreboard">
  <div>You: <span id="user-score">0</span></div>
  <div>Computer: <span id="computer-score">0</span></div>
 </div>

 <div class="arena">
  <div class="choice-display" id="user-choice"></div>
  <div class="vs">VS</div>
  <div class="choice-display" id="computer-choice"></div>
 </div>

<h2 id="result">Choose your move</h2>

  <button onclick="play('rock')">Rock</button>
  <button onclick="play('paper')">Paper</button>
  <button onclick="play('scissors')">Scissors</button>

  <h2 id="result">Result will show here</h2>
  

  <script src="script.js"></script>
</body>
</html>
